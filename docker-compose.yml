# Davao Jeepney Route Optimization — Docker Compose
# Stack: PostgreSQL, Redis, MinIO, FastAPI, Airflow (CeleryExecutor), Superset, Streamlit, pipeline
---
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW__CELERY__RESULT_BACKEND}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW__CELERY__BROKER_URL}
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    AIRFLOW_CONFIG: "/opt/airflow/config/airflow.cfg"
    POSTGRES_USER: ${SVC_PIPELINE_USER}
    POSTGRES_PASSWORD: ${SVC_PIPELINE_PASSWORD}
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: ${POSTGRES_DB}
    SVC_PIPELINE_DSN: ${SVC_PIPELINE_DSN}
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    MINIO_BUCKET: ${MINIO_BUCKET}
    FASTAPI_URL: ${FASTAPI_URL}
    RANDOM_SEED: ${RANDOM_SEED}
    DBT_TARGET: ${DBT_TARGET}
    SCIENCE_PARQUET_DIR: ${SCIENCE_PARQUET_DIR}
    AB_EXPERIMENT_ID: ${AB_EXPERIMENT_ID}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/dbt:/opt/airflow/dbt
    - ${AIRFLOW_PROJ_DIR:-.}/producers:/opt/airflow/producers
    - ${AIRFLOW_PROJ_DIR:-.}/ingestion:/opt/airflow/ingestion
    - ${AIRFLOW_PROJ_DIR:-.}/science:/opt/airflow/science
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
  networks:
    - jeepney_route

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Silver + Gold warehouse, and Airflow metadata DB
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: jeepney_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_EXPOSED_PORT:-5432}:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: always
    networks:
      - jeepney_route

  # ---------------------------------------------------------------------------
  # pgAdmin — Web UI for PostgreSQL
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: jeepney_pgadmin
    restart: always
    ports:
      - "5050:80"
    volumes:
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json
      - ./config/pgadmin/pgpass:/pgpass
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jeepney_route

  # ---------------------------------------------------------------------------
  # Redis — Airflow CeleryExecutor broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-bookworm
    container_name: jeepney_redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - jeepney_route

  # ---------------------------------------------------------------------------
  # MinIO — Bronze layer object store (S3-compatible)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: jeepney_minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - jeepney_route

  # ---------------------------------------------------------------------------
  # MinIO bucket initializer — creates the 'raw' bucket on first startup
  # FIX: credentials now read from env vars instead of being hardcoded
  # ---------------------------------------------------------------------------
  minio_init:
    image: minio/mc:latest
    container_name: jeepney_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioLocalAccessKey}
      SECRET_KEY: ${MINIO_SECRET_KEY:-minioLocalSecretKey123}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minio minio123; do
          echo "Waiting for MinIO server..."
          sleep 3
        done

        mc admin user svcacct add local minio --access-key $MINIO_ACCESS_KEY --secret-key $MINIO_SECRET_KEY || echo "Service account may already exist"

        echo "✅ MinIO setup complete!"
        echo "🔑 Access Key: $MINIO_ACCESS_KEY"
        echo "🔐 Secret Key: $MINIO_SECRET_KEY"
        echo "🌐 MinIO Console: http://localhost:9001"
        echo "📡 MinIO API: http://localhost:9000"
    restart: "no"
    networks:
      - jeepney_route

  # ---------------------------------------------------------------------------
  # FastAPI — Bronze ingestion API
  # FIX: added network, env vars now from .env, added postgres dependency
  # ---------------------------------------------------------------------------
  fastapi:
    build:
      context: ./fastapi_app
      dockerfile: Dockerfile
    container_name: jeepney_fastapi
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_USER: ${SVC_FASTAPI_USER}
      POSTGRES_PASSWORD: ${SVC_FASTAPI_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      SVC_FASTAPI_DSN: ${SVC_FASTAPI_DSN}
    volumes:
      - ./fastapi_app:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - jeepney_route

  # ---------------------------------------------------------------------------
  # Airflow services
  # ---------------------------------------------------------------------------
  airflow-apiserver:
    <<: *airflow-common
    container_name: jeepney_airflow_apiserver
    command: >
      bash -c "
        python /opt/airflow/config/setup_conn.py &&
        airflow api-server
      "
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    healthcheck:
      test:
        ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: jeepney_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    container_name: jeepney_airflow_dag_processor
    command: dag-processor
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: jeepney_airflow_worker
    command: celery worker
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: jeepney_airflow_triggerer
    command: triggerer
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    container_name: jeepney_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Postgres is ready!"
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you SHOULD follow the instructions below to set "
          echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
          echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        echo
        echo "Creating missing opt dirs if missing:"
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Creating and setting permissions for /reports:"
        mkdir -v -p /reports
        chown -R "${AIRFLOW_UID}:0" /reports
        chmod -R 775 /reports
        echo
        echo "Airflow version:"
        /entrypoint airflow version
        echo
        echo "Running airflow config list to create default config file if missing."
        /entrypoint airflow config list >/dev/null
        echo
        echo "Change ownership of files in /opt/airflow to ${AIRFLOW_UID}:0"
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
        ls -la /opt/airflow/{logs,dags,plugins,config}
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    user: "0:0"

  airflow-cli:
    <<: *airflow-common
    container_name: jeepney_airflow_cli
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

  flower:
    <<: *airflow-common
    container_name: jeepney_flower
    command: celery flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Apache Superset — BI dashboards
  # Connects as svc_bi (jeepney_reader — SELECT only on marts)
  # ---------------------------------------------------------------------------
  superset:
    image: apache/superset:4.1.1
    container_name: jeepney_supersetdock
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: ${SVC_BI_DSN}
    volumes:
      - superset_home:/app/superset_home
      - ./superset/dashboards:/app/dashboards
    restart: unless-stopped
    networks:
      - jeepney_route

  # ---------------------------------------------------------------------------
  # Streamlit — Data science results app
  # Connects as svc_bi (jeepney_reader — SELECT only on marts)
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    container_name: jeepney_streamlit
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${SVC_BI_USER}
      DB_PASS: ${SVC_BI_PASSWORD}
      PARQUET_DIR: /app/parquet
    volumes:
      - ./streamlit_app:/app
      - ./science/parquet:/app/parquet
    command: streamlit run /app/app.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
    networks:
      - jeepney_route

  # ---------------------------------------------------------------------------
  # Pipeline — one-shot runner for producers, ingestion, dbt, science scripts
  # Used via: docker-compose run --rm pipeline python /app/...
  # Connects as svc_pipeline (jeepney_admin — full DDL+DML on staging + marts)
  # ---------------------------------------------------------------------------
  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: jeepney_pipeline
    depends_on:
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # svc_pipeline — jeepney_admin role — runs dbt, ingest, science scripts
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${SVC_PIPELINE_USER}
      DB_PASS: ${SVC_PIPELINE_PASSWORD}
      SVC_PIPELINE_DSN: ${SVC_PIPELINE_DSN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      FASTAPI_URL: ${FASTAPI_URL}
      RANDOM_SEED: ${RANDOM_SEED}
      DBT_TARGET: ${DBT_TARGET}
      SCIENCE_PARQUET_DIR: ${SCIENCE_PARQUET_DIR}
      AB_EXPERIMENT_ID: ${AB_EXPERIMENT_ID}
    volumes:
      - ./producers:/app/producers
      - ./ingestion:/app/ingestion
      - ./dbt:/app/dbt
      - ./science:/app/science
    profiles: ["pipeline"]
    networks:
      - jeepney_route

volumes:
  postgres-db-volume:
  minio_data:
  superset_home:

networks:
  jeepney_route:
    driver: bridge
