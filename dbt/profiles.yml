jeepney_dw:
  target: dev

  outputs:
    # ── Local Docker Compose development ──────────────────────────────────────
    dev:
      type: postgres
      host: postgres
      port: 5432
      dbname: "{{ env_var('DB_NAME', 'jeepney_dw') }}"
      user: "{{ env_var('SVC_PIPELINE_USER', 'svc_pipeline') }}"
      password: "{{ env_var('SVC_PIPELINE_PASSWORD', 'pipeline_pass_123') }}"
      schema: staging
      threads: 1
      connect_timeout: 30
      keepalives_idle: 0

    # ── Production ────────────────────────────────────────────────────────────
    prod:
      type: postgres
      host: "{{ env_var('DB_HOST') }}"
      port: "{{ env_var('DB_PORT', '5432') | int }}"
      dbname: "{{ env_var('DB_NAME') }}"
      user: "{{ env_var('SVC_PIPELINE_USER', 'svc_pipeline') }}"
      password: "{{ env_var('SVC_PIPELINE_PASSWORD', 'pipeline_pass_123') }}"
      schema: staging
      threads: 1
      connect_timeout: 60
      keepalives_idle: 300
