# =============================================================================
# dbt_project.yml
# Davao Jeepney Route Optimization — dbt project configuration
# dbt version : 1.12.0-b1  (as seen in Airflow logs)
# Profiles dir: /opt/airflow/dbt/profiles.yml
# =============================================================================

name: jeepney_dw
version: "1.0.0"
profile: jeepney_dw

model-paths: ["models"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  jeepney_dw:
    # -------------------------------------------------------------------------
    # STAGING — Silver layer
    # All views over FK-linked source tables.
    # threads: 1 in profiles.yml serialises execution — no deadlock possible.
    # -------------------------------------------------------------------------
    staging:
      +materialized: view
      +schema: staging
      +tags:
        - silver
        - staging

    # -------------------------------------------------------------------------
    # INTERMEDIATE — pre-Gold aggregations
    # No FK constraint contention — safe to run in parallel.
    # -------------------------------------------------------------------------
    intermediate:
      +materialized: table
      +schema: intermediate
      +tags:
        - intermediate

    # -------------------------------------------------------------------------
    # MARTS — Gold layer
    # Full-refresh tables. No FK constraints. Safe to run in parallel.
    # -------------------------------------------------------------------------
    marts:
      +materialized: table
      +schema: marts
      +tags:
        - gold
        - marts
