# =============================================================================
# dbt_project.yml
# Davao Jeepney Route Optimization — dbt project configuration
# dbt version : 1.12.0-b1
# Profiles dir: /opt/airflow/dbt/profiles.yml
# =============================================================================

name: jeepney_dw
version: "1.0.0"
profile: jeepney_dw

model-paths: ["models"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  jeepney_dw:
    # -------------------------------------------------------------------------
    # STAGING — Silver layer
    # Source tables live in staging schema (created by init scripts).
    # dbt views land in staging_views to avoid name collision with source tables.
    # threads: 1 in profiles.yml serialises execution — no FK deadlock possible.
    # -------------------------------------------------------------------------
    staging:
      +materialized: view
      +schema: staging_views
      +tags:
        - silver
        - staging

    # -------------------------------------------------------------------------
    # INTERMEDIATE — pre-Gold aggregations
    # int_passenger_features is a TABLE (written to staging schema so
    # science/clustering.py can read it directly from PostgreSQL).
    # All others are ephemeral (inlined as CTEs — never written to DB).
    # -------------------------------------------------------------------------
    intermediate:
      +materialized: ephemeral
      +schema: intermediate
      +tags:
        - intermediate

    # -------------------------------------------------------------------------
    # MARTS — Gold layer
    # Full-refresh tables. No FK constraints. Safe to run in parallel.
    # -------------------------------------------------------------------------
    marts:
      +materialized: table
      +schema: marts
      +tags:
        - gold
        - marts
